services:
  - type: web
    name: evalix-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn evalix.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "evalix-api.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://evalix.vercel.app"
      - key: DATABASE_URL
        sync: false
